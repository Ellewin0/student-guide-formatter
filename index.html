<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Guide Formatter</title>
  <meta name="description" content="A public-safe GitHub Pages guide formatter for student-facing step-by-step guides." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to guide content</a>

  <header class="site-header" aria-label="Guide actions">
    <div class="site-header__inner">
      <div>
        <p class="eyebrow">Guide Formatter</p>
        <h1 id="site-title">Student Guide</h1>
      </div>
      <div class="actions">
        <button type="button" id="printBtn" class="button">Print / Save as PDF</button>
      </div>
    </div>
  </header>

  <main id="main" class="page-shell" aria-live="polite">
    <section id="status" class="notice" role="status">
      Loading guide content…
    </section>

    <article id="guide" class="guide" hidden>
      <section class="title-page" aria-labelledby="guide-title">
        <p class="guide-label" id="guide-subtitle">Student Guide</p>
        <h2 id="guide-title"></h2>
        <p id="guide-purpose" class="purpose"></p>

        <dl class="meta-grid" aria-label="Guide details">
          <div>
            <dt>Audience</dt>
            <dd id="guide-audience"></dd>
          </div>
          <div>
            <dt>Format</dt>
            <dd>Step-by-step guide</dd>
          </div>
        </dl>
      </section>

      <nav class="contents-card" aria-labelledby="contents-heading">
        <h2 id="contents-heading">Contents</h2>
        <ol id="contents-list"></ol>
      </nav>

      <div id="guide-sections"></div>
    </article>
  </main>

  <footer class="site-footer">
    <p>This page formats structured guide content from <code>guide-data.json</code>. Keep all published content public-safe.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
